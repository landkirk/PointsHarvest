name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get version
        id: version
        run: |
          if [ "${{ github.ref_name }}" != "" ]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=manual-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          fi
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create extension ZIP
        run: |
          cd dist
          zip -r ../PointsHarvest-${{ steps.version.outputs.version }}.zip .
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: PointsHarvest-*.zip
          draft: false
          prerelease: false
      
      - name: Upload artifact to github releases (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: PointsHarvest-extension
          path: PointsHarvest-*.zip

      - name: Upload versioned zip to R2
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: r2 object put points-harvest-release/PointsHarvest-${{ steps.version.outputs.version }}.zip --file=PointsHarvest-${{ steps.version.outputs.version }}.zip --remote

      - name: Upload latest zip to R2
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: r2 object put points-harvest-release/PointsHarvest-latest.zip --file=PointsHarvest-${{ steps.version.outputs.version }}.zip --remote

      - name: Upload latest-version.txt to R2
        run: echo -n "${{ steps.version.outputs.version }}" > latest-version.txt
      - uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: r2 object put points-harvest-release/latest-version.txt --file=latest-version.txt --remote --content-type=text/plain
